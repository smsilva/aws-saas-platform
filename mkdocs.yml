site_name: EKS Lab — ALB + Istio + Autenticação Multi-tenant
site_description: >
  Laboratório de EKS com VPC, ALB, Istio Gateway, WAF, Cognito e DynamoDB.
  Plataforma SaaS multi-tenant com autenticação federada via múltiplos IdPs.
site_author: Silvio Silva
site_url: https://smsilva.github.io/aws-saas-platform/
repo_url: https://github.com/smsilva/aws-saas-platform
repo_name: smsilva/aws-saas-platform

docs_dir: docs

theme:
  name: material
  language: pt-BR
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - toc.integrate
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
  palette:
    - scheme: default
      primary: indigo
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Mudar para tema escuro
    - scheme: slate
      primary: indigo
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Mudar para tema claro
  icon:
    logo: material/cloud-braces

plugins:
  - search:
      lang: pt

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
      use_pygments: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - tables
  - attr_list
  - md_in_html
  - def_list
  - toc:
      permalink: true
      title: Nesta página

nav:
  - Início: README.md

  - Architecture:
    - architecture/README.md
    - Traffic Flow: architecture/traffic-flow.md
    - Multi-tenant Authentication: multi-tenant-auth-flow.md
    - Technical Decisions: technical-decisions.md

  - Operations:
    - operations/README.md
    - Step-by-Step: operations/step-by-step.md
    - Customer Onboarding: customer-onboarding.md
    - Destroy the Lab: operations/destroy-lab.md

  - Frontend:
    - Design System: design-system.md

  - Services:
    - services/README.md
    - Discovery: services/discovery.md
    - Platform Frontend: services/platform-frontend.md
    - Callback Handler: services/callback-handler.md

  - Security:
    - security/README.md
    - SEC-002 — IAM Policy without hash: security/issues/sec-002.md
    - SEC-003 — Image without digest: security/issues/sec-003.md
    - SEC-004 — Unrestricted cluster-admin: security/issues/sec-004.md
    - SEC-005 — ALB Security Groups: security/issues/sec-005.md
    - SEC-006 — IMDSv1 on nodes: security/issues/sec-006.md
    - SEC-007 — WAF without rate limiting: security/issues/sec-007.md
